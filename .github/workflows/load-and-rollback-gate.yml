name: Load and rollback gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  long-burst:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ingestion,dev]"
      - name: Run long burst profile
        run: |
          run-load-gate --profile long --target-p95-ms 1000
      - name: Run rollback drill smoke
        run: |
          run-rollback-gate
