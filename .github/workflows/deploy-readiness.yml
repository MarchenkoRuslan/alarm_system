name: Deploy readiness gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ingestion,dev]"

      - name: Build worker and API Docker images
        run: |
          docker build -t alarm-system-worker:ci -f Dockerfile.worker .
          docker build -t alarm-system-api:ci -f Dockerfile.api .

      - name: Validate Docker Compose config (dry-run profile)
        run: |
          cp .env.example .env
          docker compose --profile dry-run config > deploy-readiness-compose-config.txt

      - name: Docker dry-run smoke
        run: |
          docker compose --profile dry-run up -d redis alarm-service-dry-run
          sleep 10
          docker compose logs alarm-service-dry-run > deploy-readiness-dry-run.log
          python -c "
          from pathlib import Path
          text = Path('deploy-readiness-dry-run.log').read_text(encoding='utf-8')
          assert '\"kind\": \"startup_checks\"' in text, 'startup_checks log missing'
          assert '\"kind\": \"startup\"' in text, 'startup log missing'
          print('docker dry-run smoke OK')
          "

      - name: Docker API smoke
        env:
          API_SMOKE_MAX_RETRIES: "30"
          API_SMOKE_RETRY_SLEEP_SEC: "2"
        run: |
          ALARM_POSTGRES_DSN=postgresql://alarm_user:alarm_password@postgres:5432/alarm_system docker compose --profile interactive up -d postgres redis alarm-api
          docker compose logs alarm-api > deploy-readiness-api.log || true
          python -c "
          import os
          import time
          import urllib.request
          max_retries = int(os.getenv('API_SMOKE_MAX_RETRIES', '30'))
          retry_sleep_sec = float(os.getenv('API_SMOKE_RETRY_SLEEP_SEC', '2'))
          last_error = None
          for _ in range(max_retries):
            try:
              resp = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
              if resp.status == 200:
                print('docker api smoke OK')
                raise SystemExit(0)
              last_error = RuntimeError(f'unexpected /health status: {resp.status}')
            except Exception as exc:  # noqa: BLE001
              last_error = exc
            time.sleep(retry_sleep_sec)
          raise SystemExit(f'docker api smoke failed: {last_error}')
          "
          docker compose logs alarm-api > deploy-readiness-api.log

      - name: Lint with flake8
        run: |
          flake8 src tests --count

      - name: Run unit and integration tests
        run: |
          pytest

      - name: Run hardening subset
        run: |
          pytest tests/test_runtime_metrics.py tests/test_observability.py tests/test_backpressure_runtime.py tests/ingestion/test_polymarket_reconnect.py tests/test_rollback_drill.py

      - name: Run long load gate
        run: |
          run-load-gate --profile long --target-p95-ms 1000 > deploy-readiness-load.json

      - name: Run rollback gate
        run: |
          run-rollback-gate > deploy-readiness-rollback.json

      - name: Upload deploy readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-readiness-artifacts
          path: |
            deploy-readiness-load.json
            deploy-readiness-rollback.json
            deploy-readiness-compose-config.txt
            deploy-readiness-dry-run.log
            deploy-readiness-api.log

      - name: Cleanup Docker Compose services
        if: always()
        run: |
          docker compose --profile dry-run --profile interactive down --volumes --remove-orphans
